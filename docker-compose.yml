version: "3.8"

services:

  frontend:
    build:
      context: ./frontend
    container_name: react-frontend
    ports:
      - "3001:4173"
    depends_on:
      - backend


  backend:
    build:
      context: ./backend
    container_name: node-backend
    ports:
      - "5000:4000"
    environment:
      MONGO_URI: mongodb://database:27017/myapp
    depends_on:
      - database


  database:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db


volumes:

  mongo_data: